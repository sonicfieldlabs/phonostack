name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret literal scan
        shell: bash
        run: |
          set -euo pipefail
          secret_pattern='(xi-[A-Za-z0-9_-]{20,}|sk-[A-Za-z0-9_-]{20,}|sk_(live|test)_[A-Za-z0-9]{20,}|AIza[0-9A-Za-z_-]{30,}|eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,})'
          if git grep -n -I -E "$secret_pattern" HEAD -- \
            ':(exclude)package-lock.json' \
            ':(exclude)*.png' \
            ':(exclude)*.jpg' \
            ':(exclude)*.jpeg' \
            ':(exclude)*.ico'
          then
            echo "::error::Potential secret-like literal found. Remove it before pushing."
            exit 1
          fi
          echo "No secret-like literals found."

  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Dependency audit
        run: npm run audit:deps

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          PHONOSTACK_STORAGE_BUCKET: phonostack-sounds
          PHONOSTACK_LOCAL_STORAGE_SECRET: ci-local-storage-secret
